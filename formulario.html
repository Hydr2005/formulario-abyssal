<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Formulario Abyssal</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1 class="logo">ABYSSAL</h1>

<div id="user"></div>

<div class="progress">

<div id="progress-bar"></div>

</div>

<form id="form">

<label>¿Por qué deberíamos elegirte?</label>
<textarea maxlength="500"></textarea>
<span class="counter">0/500</span>

<label>¿Por qué quieres pertenecer al staffteam?</label>
<textarea maxlength="500"></textarea>
<span class="counter">0/500</span>

<label>¿Qué cualidades destacan en ti?</label>
<textarea maxlength="500"></textarea>
<span class="counter">0/500</span>

<label>Discusión fuerte entre miembros ¿cómo actuarías?</label>
<textarea maxlength="600"></textarea>
<span class="counter">0/600</span>

<label>Filtración de información del staff</label>
<textarea maxlength="600"></textarea>
<span class="counter">0/600</span>

<label>La comunidad protesta por una regla</label>
<textarea maxlength="600"></textarea>
<span class="counter">0/600</span>

<label>Un staff abusa de permisos</label>
<textarea maxlength="600"></textarea>
<span class="counter">0/600</span>

<button type="submit">
Enviar formulario
</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
