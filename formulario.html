<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Formulario Staff Abyssal</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="form-box">

<h1>Postulación Staff Abyssal</h1>

<div id="user"></div>

<div class="requisitos">

<h3>Requisitos</h3>

<ul>

<li>Tener 14 o más años</li>
<li>Contar con micrófono activo</li>
<li>Ser activo en la comunidad</li>
<li>No tener sanciones graves</li>

</ul>

</div>

<form id="form">

<h2>Información Personal</h2>

<label>¿Por qué deberíamos elegirte?</label>
<textarea id="p1" required></textarea>

<label>¿Por qué quieres pertenecer al staffteam de Abyssal?</label>
<textarea id="p2" required></textarea>

<label>¿Qué cualidades destacan en ti?</label>
<textarea id="p3" required></textarea>

<label>¿Algo más que quieras añadir?</label>
<textarea id="p4"></textarea>


<h2>Situaciones del Staff</h2>

<label>
Dos miembros de Abyssal comienzan una discusión fuerte en público dentro del servidor, y la comunidad empieza a tomar bandos. Ambos aportan mucho al proyecto y expulsar a alguno podría generar problemas. ¿Cómo manejarías la situación?
</label>
<textarea id="p5" required></textarea>


<label>
Descubres que alguien del equipo está filtrando información interna del staff de Abyssal a otra comunidad o servidor. No tienes pruebas completamente concluyentes, pero varios indicios apuntan a esa persona. ¿Qué harías?
</label>
<textarea id="p6" required></textarea>


<label>
El staff decide implementar una regla nueva que mejora la organización de la comunidad, pero la mayoría de los miembros está en contra y empieza a protestar. Si fueras parte del equipo que debe aplicarla, ¿cómo manejarías la situación?
</label>
<textarea id="p7" required></textarea>


<label>
Un miembro del staff empieza a usar sus permisos de forma injusta (muteos, baneos o favoritismo), pero es amigo cercano de varios administradores. ¿Cómo actuarías sin provocar un conflicto mayor dentro del equipo?
</label>
<textarea id="p8" required></textarea>


<button type="submit">
Enviar Postulación
</button>

</form>

</div>

<script src="formulario.js"></script>

</body>

</html>
