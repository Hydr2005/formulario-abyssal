<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Formulario Abyssal</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="form-card">

<h2>Postulación Staff Abyssal</h2>

<div class="requisitos">

<h3>Requisitos</h3>

<ul>
<li>Tener 14 o más años</li>
<li>Contar con micrófono activo</li>
<li>Ser activo en la comunidad</li>
<li>No tener sanciones dentro de la comunidad</li>
</ul>

</div>

<form id="form">

<label>¿Cuántos años tienes?</label>
<input name="edad" required>

<label>¿Cuál es tu nombre en Discord?</label>
<input name="discord" required>

<label>Dos miembros de Abyssal comienzan una discusión fuerte en público...</label>
<textarea name="situacion1" required></textarea>

<label>Descubres que alguien del equipo está filtrando información...</label>
<textarea name="situacion2" required></textarea>

<label>El staff decide implementar una regla nueva...</label>
<textarea name="situacion3" required></textarea>

<label>Un miembro del staff usa permisos injustamente...</label>
<textarea name="situacion4" required></textarea>

<label>¿Por qué deberíamos elegirte?</label>
<textarea name="p1" required></textarea>

<label>¿Por qué quieres pertenecer al staffteam de Abyssal?</label>
<textarea name="p2" required></textarea>

<label>¿Qué cualidades destacan en ti?</label>
<textarea name="p3" required></textarea>

<label>¿Algo más que quieras añadir?</label>
<textarea name="p4"></textarea>

<button type="submit">Enviar solicitud</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
