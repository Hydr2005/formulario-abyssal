<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Formulario Staff</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div id="user"></div>

<h2>Formulario Staff Abyssal</h2>

<h3>Requisitos</h3>

<ul>

<li>Tener 14 o más años</li>
<li>Micrófono activo</li>
<li>Ser activo</li>
<li>No tener sanciones</li>

</ul>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<form id="form">

<label>Edad</label>
<input name="edad" required>

<label>Discusión entre miembros</label>
<textarea name="discusion" required></textarea>

<label>Filtración de staff</label>
<textarea name="filtracion" required></textarea>

<label>Protesta comunidad</label>
<textarea name="regla" required></textarea>

<label>Abuso de permisos</label>
<textarea name="abuso" required></textarea>

<label>Por qué deberíamos elegirte</label>
<textarea name="porque"></textarea>

<label>Motivación staff</label>
<textarea name="motivacion"></textarea>

<label>Cualidades</label>
<textarea name="cualidades"></textarea>

<label>Extra</label>
<textarea name="extra"></textarea>

<button>Enviar formulario</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
