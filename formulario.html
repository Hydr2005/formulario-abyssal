<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Postulación Staff - Abyssal</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>Postulación Staff Abyssal</h1>

<form id="form">

<label>ID de Discord</label>
<input type="text" name="discord_id" placeholder="Ej: 123456789012345678" required>

<label>¿Cuál es tu edad?</label>
<input type="number" name="edad" required>

<label>¿Cuál es tu nombre en Discord?</label>
<input type="text" name="discord_nombre" required>

<label>Dos miembros de Abyssal comienzan una discusión fuerte...</label>
<textarea name="discusion" required></textarea>

<label>Descubres que alguien del equipo está filtrando información...</label>
<textarea name="filtracion" required></textarea>

<label>El staff decide implementar una regla nueva...</label>
<textarea name="regla" required></textarea>

<label>Un miembro del staff empieza a abusar de permisos...</label>
<textarea name="abuso" required></textarea>

<label>¿Por qué crees que deberíamos elegirte?</label>
<textarea name="porque_elegirte" required></textarea>

<label>¿Por qué quieres pertenecer al staffteam de abyssal?</label>
<textarea name="motivacion" required></textarea>

<label>¿Qué cualidades destacan en ti?</label>
<textarea name="cualidades" required></textarea>

<label>¿Algo más que quieras añadir a tu postulación?</label>
<textarea name="extra"></textarea>

<button type="submit">Enviar formulario</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
